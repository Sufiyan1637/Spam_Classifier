<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpamShield — Message Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: #1e1e2e;
      --accent: #e8ff47;
      --accent-dim: rgba(232,255,71,0.12);
      --spam-red: #ff3b5c;
      --spam-glow: rgba(255,59,92,0.25);
      --ham-green: #00e5a0;
      --ham-glow: rgba(0,229,160,0.25);
      --text: #e8e8f0;
      --muted: #5a5a7a;
      --font-head: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    html, body {
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.6; transform: translateX(-50%) scale(1); }
      50% { opacity: 1; transform: translateX(-50%) scale(1.1); }
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
    }

    /* Header */
    header {
      text-align: center;
      margin-bottom: 56px;
      animation: fadeDown 0.7s ease both;
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--accent-dim);
      border: 1px solid rgba(232,255,71,0.3);
      color: var(--accent);
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 100px;
      margin-bottom: 24px;
    }

    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1.8s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    h1 {
      font-size: clamp(40px, 8vw, 72px);
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #fff;
    }

    h1 span {
      color: var(--accent);
      position: relative;
    }

    .subtitle {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
      letter-spacing: 0.04em;
    }

    /* Main card */
    .card {
      width: 100%;
      max-width: 680px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      animation: fadeUp 0.7s 0.15s ease both;
      position: relative;
      overflow: hidden;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      opacity: 0.5;
    }

    label {
      display: block;
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .textarea-wrap {
      position: relative;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.7;
      padding: 18px 20px;
      resize: vertical;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    textarea::placeholder { color: var(--muted); }

    textarea:focus {
      border-color: rgba(232,255,71,0.4);
      box-shadow: 0 0 0 3px rgba(232,255,71,0.06);
    }

    .char-count {
      position: absolute;
      bottom: 12px;
      right: 16px;
      font-size: 11px;
      color: var(--muted);
    }

    /* Examples */
    .examples {
      margin-top: 14px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .examples span {
      font-size: 11px;
      color: var(--muted);
      margin-right: 2px;
    }

    .example-chip {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 4px 12px;
      border-radius: 100px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .example-chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-dim);
    }

    /* Button */
    .btn-wrap {
      margin-top: 28px;
    }

    button.analyze {
      width: 100%;
      padding: 18px;
      background: var(--accent);
      color: #0a0a0f;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    button.analyze:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232,255,71,0.3);
    }

    button.analyze:active { transform: translateY(0); }

    button.analyze.loading {
      pointer-events: none;
      opacity: 0.8;
    }

    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 10px; }

    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(0,0,0,0.2);
      border-top-color: #0a0a0f;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading .spinner { display: block; }
    .loading .btn-text::after { content: 'Analyzing...'; }
    .btn-text::after { content: 'Analyze Message'; }

    /* Result */
    .result-wrap {
      margin-top: 32px;
      animation: resultIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes resultIn {
      from { opacity: 0; transform: scale(0.92) translateY(10px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .result-card {
      border-radius: 14px;
      padding: 28px 32px;
      display: flex;
      align-items: center;
      gap: 20px;
      border: 1px solid;
      position: relative;
      overflow: hidden;
    }

    .result-card.spam {
      background: rgba(255,59,92,0.07);
      border-color: rgba(255,59,92,0.35);
      box-shadow: 0 0 40px var(--spam-glow);
    }

    .result-card.ham {
      background: rgba(0,229,160,0.07);
      border-color: rgba(0,229,160,0.35);
      box-shadow: 0 0 40px var(--ham-glow);
    }

    .result-icon {
      font-size: 40px;
      flex-shrink: 0;
      animation: iconPop 0.4s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes iconPop {
      from { transform: scale(0); }
      to { transform: scale(1); }
    }

    .result-text {}

    .result-verdict {
      font-size: 28px;
      font-weight: 800;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .result-card.spam .result-verdict { color: var(--spam-red); }
    .result-card.ham .result-verdict { color: var(--ham-green); }

    .result-desc {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }

    .result-badge {
      margin-left: auto;
      padding: 6px 16px;
      border-radius: 100px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .result-card.spam .result-badge {
      background: rgba(255,59,92,0.15);
      color: var(--spam-red);
      border: 1px solid rgba(255,59,92,0.3);
    }

    .result-card.ham .result-badge {
      background: rgba(0,229,160,0.15);
      color: var(--ham-green);
      border: 1px solid rgba(0,229,160,0.3);
    }

    /* Scanline effect on result */
    .result-card::after {
      content: '';
      position: absolute;
      top: -100%;
      left: 0; right: 0;
      height: 40%;
      background: linear-gradient(transparent, rgba(255,255,255,0.02), transparent);
      animation: scan 3s linear infinite;
    }

    @keyframes scan {
      to { top: 200%; }
    }

    /* Stats row */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 40px;
      width: 100%;
      max-width: 680px;
      animation: fadeUp 0.7s 0.3s ease both;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      text-align: center;
    }

    .stat-val {
      font-size: 26px;
      font-weight: 800;
      color: var(--accent);
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 4px;
    }

    /* Error */
    .error-msg {
      margin-top: 16px;
      padding: 14px 18px;
      background: rgba(255,59,92,0.08);
      border: 1px solid rgba(255,59,92,0.25);
      border-radius: 10px;
      color: var(--spam-red);
      font-size: 13px;
      display: none;
    }

    .error-msg.show { display: block; }

    /* Footer */
    footer {
      margin-top: 60px;
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      animation: fadeUp 0.7s 0.4s ease both;
    }

    footer a { color: var(--accent); text-decoration: none; }

    @media (max-width: 500px) {
      .card { padding: 28px 20px; }
      .stats { grid-template-columns: 1fr; }
      .result-badge { display: none; }
    }
  </style>
</head>
<body>
<div class="page">

  <header>
    <div class="badge">
      <span class="badge-dot"></span>
      ML-Powered Detection
    </div>
    <h1>Spam<span>Shield</span></h1>
    <p class="subtitle">Paste any message — get an instant verdict</p>
  </header>

  <div class="card">
    <label for="msg">Message Input</label>
    <div class="textarea-wrap">
      <textarea id="msg" placeholder="Paste or type your message here…" maxlength="2000" oninput="updateCount()"></textarea>
      <span class="char-count" id="charCount">0 / 2000</span>
    </div>

    <div class="examples">
      <span>Try:</span>
      <button class="example-chip" onclick="fillExample(0)">Congratulations winner!</button>
      <button class="example-chip" onclick="fillExample(1)">Hey, lunch today?</button>
      <button class="example-chip" onclick="fillExample(2)">Claim your prize now</button>
    </div>

    <div class="btn-wrap">
      <button class="analyze" id="analyzeBtn" onclick="analyze()">
        <div class="btn-inner">
          <div class="spinner"></div>
          <span class="btn-text"></span>
        </div>
      </button>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div id="resultWrap"></div>
  </div>

  <div class="stats">
    <div class="stat">
      <div class="stat-val" id="totalCount">0</div>
      <div class="stat-label">Analyzed</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="spamCount">0</div>
      <div class="stat-label">Spam Found</div>
    </div>
    <div class="stat">
      <div class="stat-val" id="hamCount">0</div>
      <div class="stat-label">Legit Messages</div>
    </div>
  </div>

  <footer>
    Built with Flask + Scikit-learn &nbsp;·&nbsp; <a href="#">SpamShield v1.0</a>
  </footer>
</div>

<script>
  const examples = [
    "Congratulations! You've won a $1000 gift card. Click here to claim your prize now! Limited time offer. Reply WIN to redeem.",
    "Hey, are we still on for lunch today? Let me know what time works for you.",
    "URGENT: Your account has been compromised. Click this link immediately to verify your details and claim your $500 reward."
  ];

  let stats = { total: 0, spam: 0, ham: 0 };

  function fillExample(idx) {
    document.getElementById('msg').value = examples[idx];
    updateCount();
  }

  function updateCount() {
    const len = document.getElementById('msg').value.length;
    document.getElementById('charCount').textContent = `${len} / 2000`;
  }

  function updateStats(isSpam) {
    stats.total++;
    if (isSpam) stats.spam++; else stats.ham++;
    document.getElementById('totalCount').textContent = stats.total;
    document.getElementById('spamCount').textContent = stats.spam;
    document.getElementById('hamCount').textContent = stats.ham;
  }

  async function analyze() {
    const msg = document.getElementById('msg').value.trim();
    const btn = document.getElementById('analyzeBtn');
    const errorEl = document.getElementById('errorMsg');
    const resultWrap = document.getElementById('resultWrap');

    errorEl.classList.remove('show');
    resultWrap.innerHTML = '';

    if (!msg) {
      errorEl.textContent = 'Please enter a message to analyze.';
      errorEl.classList.add('show');
      return;
    }

    btn.classList.add('loading');

    try {
      const res = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg })
      });

      const data = await res.json();

      if (data.error) throw new Error(data.error);

      const isSpam = data.is_spam;
      updateStats(isSpam);

      resultWrap.innerHTML = `
        <div class="result-wrap">
          <div class="result-card ${isSpam ? 'spam' : 'ham'}">
            <div class="result-icon">${isSpam ? '🚨' : '✅'}</div>
            <div class="result-text">
              <div class="result-verdict">${isSpam ? 'SPAM' : 'NOT SPAM'}</div>
              <div class="result-desc">${isSpam
                ? 'This message shows strong indicators of spam. Avoid clicking any links.'
                : 'This message appears to be legitimate. No spam patterns detected.'
              }</div>
            </div>
            <div class="result-badge">${isSpam ? '⚠ Blocked' : '✓ Clear'}</div>
          </div>
        </div>
      `;
    } catch (err) {
      errorEl.textContent = 'Something went wrong. Make sure the Flask server is running.';
      errorEl.classList.add('show');
    } finally {
      btn.classList.remove('loading');
    }
  }

  document.getElementById('msg').addEventListener('keydown', e => {
    if (e.ctrlKey && e.key === 'Enter') analyze();
  });
</script>
</body>
</html>
